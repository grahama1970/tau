    files:
      - README.md
      - docs/non-claims.md

  - id: local-provider-evidence
    label: "Local provider evidence"
    tech: "readiness receipt; no model approval claim"
    latency: "planned PR"
    color: amber

  - id: no-egress-evidence
    label: "Airgap/no-egress evidence"
    tech: "bounded probes; not certification"
    latency: "planned PR"
    color: red

  - id: sparta-explorer
    label: "Sparta Explorer posture UI"
    tech: "posture contract, proof chain, blockers"
    latency: "human workbench"
    color: purple
