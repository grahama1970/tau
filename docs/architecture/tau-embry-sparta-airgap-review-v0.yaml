      - docs/briefs/lockheed-angle.md

  - id: human-approval
    label: "Human export-control approval"
    tech: "required final authority"
    latency: "manual"
    color: red
    files:
      - docs/github-review-access.md

connections:
  - from: embry-os
    to: synthetic-boundary
  - from: synthetic-boundary
    to: tau-control-plane
  - from: tau-control-plane
    to: local-provider-evidence
  - from: tau-control-plane
    to: no-egress-evidence
  - from: local-provider-evidence
    to: sparta-explorer
  - from: no-egress-evidence
    to: sparta-explorer
  - from: sparta-explorer
