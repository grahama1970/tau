name: "tau-embry-sparta-airgap-review-v0"
components:
  - id: embry-os
    label: "Embry-OS local services"
    tech: "memory, scillm, local APIs, monitors"
    latency: "local only"
    color: blue
    files:
      - docs/briefs/tau-for-airgapped-agentic-compliance.md

  - id: synthetic-boundary
    label: "Synthetic data boundary"
    tech: "demo data policy; no real controlled data"
    latency: "preflight"
    color: green
    files:
      - docs/demo-data-policy.md

  - id: tau-control-plane
    label: "Tau gates and DAG harness"
    tech: "policy, data boundary, receipts, validators"
    latency: "bounded ticks"
